<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 900px; height: 383px; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; }
body { background: #0f1923; display: flex; flex-direction: column; }
.top-strip { height: 6px; background: linear-gradient(90deg,#f97316,#eab308,#f97316); flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 70px; }
.tag { font-size: 18px; font-weight: 700; color: #f97316; letter-spacing: 4px; margin-bottom: 18px; text-transform: uppercase; }
.line1 { font-size: 62px; font-weight: 900; color: white; text-align: center; letter-spacing: -2px; line-height: 1.1; }
.line1 .highlight { color: #f97316; }
.line2 { font-size: 36px; font-weight: 700; color: #f8fafc; text-align: center; margin-top: 18px; }
.line3 { font-size: 24px; font-weight: 400; color: #94a3b8; text-align: center; margin-top: 14px; }
.source-tag { font-size: 16px; font-weight: 600; color: #64748b; text-align: center; margin-top: 16px; letter-spacing: 2px; }
.bot-strip { height: 6px; background: linear-gradient(90deg,#0f1923,#1e3a5f,#0f1923); flex-shrink: 0; }
</style></head><body>
<div class="top-strip"></div>
<div class="main">
  <div class="tag">AI 助手 · 技能推荐</div>
  <div class="line1">OpenClaw <span class="highlight">10</span> 大技能</div>
  <div class="line2">让你的AI助手脱胎换骨</div>
  <div class="line3">从通用助手升级为专业工具，全方位提升生产力</div>
  <div class="source-tag">clawhub.ai · skills.sh</div>
</div>
<div class="bot-strip"></div>
</body></html>
